name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  # Fast gate: API tests are browserless, so this job skips the browser install.
  api-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Run API tests
      run: npm run test:api
      env:
        ENV: production
        ADMIN_USER: ${{ secrets.ADMIN_USER }}
        ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
    - name: Upload API blob report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: blob-api
        path: blob-report/
        retention-days: 30

  # E2E only runs if the API gate passed — keeps failures easy to diagnose.
  e2e-tests:
    needs: api-tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run E2E tests
      run: npm run test:e2e
      env:
        ENV: production
        ADMIN_USER: ${{ secrets.ADMIN_USER }}
        ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
    - name: Upload E2E blob report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: blob-e2e
        path: blob-report/
        retention-days: 30

  # Merge the api and e2e blob reports into a single HTML report.
  merge-report:
    needs: [api-tests, e2e-tests]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Download blob reports
      uses: actions/download-artifact@v4
      with:
        pattern: blob-*
        path: all-blobs
        merge-multiple: true
    - name: Merge into one HTML report
      run: npx playwright merge-reports --reporter html ./all-blobs
    - name: Upload merged report
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  # Publish the merged HTML report to GitHub Pages (only on pushes to main/master).
  deploy-report:
    needs: merge-report
    if: ${{ !cancelled() && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Avoid overlapping Pages deployments stepping on each other.
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
    - name: Download merged report artifact
      uses: actions/download-artifact@v4
      with:
        name: playwright-report
        path: playwright-report
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: playwright-report
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
